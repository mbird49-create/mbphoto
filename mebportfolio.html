<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Bird Photography</title>
    <link href="mebcss.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Jost:wght@400&family=Spectral:wght@400&display=swap"
        rel="stylesheet">
</head>

<body data-page-title="Portfolio">
    <div id="site-header"></div>
    <div id="site-nav"></div>

    <main class="container py-4">
        <h1>Portfolio</h1>
        <p class="lead" style="max-width: 760px;">
            A curated selection of close-up field photographs focused on pollinators, motion, and texture.
            This local gallery always loads, and you can still try the hosted portfolio here:
            <a href="https://portfolio.michaelbirdphotography.com" target="_blank"
                rel="noopener noreferrer">portfolio.michaelbirdphotography.com</a>
        </p>

        <section class="row g-4 py-2">
            <article class="col-12 col-md-6 col-lg-4">
                <figure class="mb-0">
                    <img src="bugs/fullsizeoutput_9d2.jpg" class="img-fluid rounded"
                        alt="Bee gathering pollen on blossoms">
                </figure>
            </article>
            <article class="col-12 col-md-6 col-lg-4">
                <figure class="mb-0">
                    <img src="bugs/IMG_3766.JPG" class="img-fluid rounded" alt="Wasp exploring squash blossom">
                </figure>
            </article>
            <article class="col-12 col-md-6 col-lg-4">
                <figure class="mb-0">
                    <img src="bugs/IMG_2620.JPG" class="img-fluid rounded" alt="Close-up portrait of wasp face">
                </figure>
            </article>
            <article class="col-12 col-md-6 col-lg-4">
                <figure class="mb-0">
                    <img src="bugs/IMG_2651.JPG" class="img-fluid rounded" alt="Insect resting along green leaf edge">
                </figure>
            </article>
            <article class="col-12 col-md-6 col-lg-4">
                <figure class="mb-0">
                    <img src="bugs/IMG_4728.jpg" class="img-fluid rounded" alt="Pollinator perched on flowering plant">
                </figure>
            </article>
            <article class="col-12 col-md-6 col-lg-4">
                <figure class="mb-0">
                    <img src="bugs/IMG_4748.JPG" class="img-fluid rounded" alt="Macro detail of insect wings and body">
                </figure>
            </article>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="mebshared.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
