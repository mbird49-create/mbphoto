<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Bird Photography</title>
    <link href="/mebcss.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Jost:wght@400&family=Spectral:wght@400&display=swap"
        rel="stylesheet">
    <script data-goatcounter="https://michaelbird.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>

<body data-page-title="Bugs">
    <div id="site-header"></div>
    <div id="site-nav"></div>

    <main class="container py-4">
        <p><a href="/mebportfolio.html">&larr; Back to Portfolio</a></p>
        <h1>Bugs</h1>
        <p class="lead" style="max-width: 760px;">Macro studies and pollinator close-ups.</p>

        <section class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3 py-2">
            <div class="col">
                <a class="gallery-thumb" href="honey bee.webp">
                    <img src="honey bee.webp" alt="Honey bee close-up on bloom">
                </a>
            </div>
            <div class="col">
                <a class="gallery-thumb" href="yellowjacket.webp">
                    <img src="yellowjacket.webp" alt="Yellowjacket in profile">
                </a>
            </div>
            <div class="col">
                <a class="gallery-thumb" href="bee tongue.webp">
                    <img src="bee tongue.webp" alt="Macro bee with visible tongue">
                </a>
            </div>
            <div class="col">
                <a class="gallery-thumb" href="gray hairstreak butterfly.webp">
                    <img src="gray hairstreak butterfly.webp" alt="Gray hairstreak butterfly resting">
                </a>
            </div>
            <div class="col">
                <a class="gallery-thumb" href="blossom bee.webp">
                    <img src="blossom bee.webp" alt="Bee gathering pollen on blossoms">
                </a>
            </div>
            <div class="col">
                <a class="gallery-thumb" href="yj looking at you.webp">
                    <img src="yj looking at you.webp" alt="Front-facing yellowjacket portrait">
                </a>
            </div>
            <div class="col">
                <a class="gallery-thumb" href="honey blossom bee.webp">
                    <img src="honey blossom bee.webp" alt="Honey bee on flower petals">
                </a>
            </div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script src="/mebshared.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
