<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Bird Photography</title>
    <link href="mebcss.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400&family=Jost:wght@400&family=Spectral:wght@400&display=swap"
        rel="stylesheet">
    <script data-goatcounter="https://michaelbird.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>

<body data-page-title="Home">
    <div id="site-header"></div>
    <br>

    <div id="site-nav"></div>




    <!--bootsstrap carousel code snippet-->

    <main class="container">
        <div id="myCarousel" class="carousel slide mb-5" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"
                    aria-current="true" aria-label="Slide 1"></button>
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1" aria-label="Slide 2"></button>
                <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="abstract2/leafFire.JPG" class="d-block w-100" alt="Abstract leaf arrangement.">
                </div>
                <div class="carousel-item">
                    <img src="ME/ruralme.JPG" class="d-block w-100" alt="Rural farm scene.">
                </div>
                <div class="carousel-item">
                    <img src="bugs/IMG_2620.JPG" class="d-block w-100" alt="Close-up of a wasp's face">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </main>



    <div id="site-footer"></div>

    <script src="mebshared.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
